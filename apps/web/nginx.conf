# CareerForge Web — Nginx site config
#
# Two jobs:
# 1. Serve the Vite SPA: all unmatched paths return index.html so that
#    client-side routes (/login, /resumes/:id, etc.) work on direct load
#    or refresh rather than returning a 404.
# 2. Proxy /api/* to the API container so the browser sees one origin and
#    the httpOnly refresh cookie's SameSite=Lax setting works without
#    requiring SameSite=None + HTTPS on localhost.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers — basic set; tighten in production as needed.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy /api to the API service.
    # The hostname "api" matches the service name in docker-compose.yml.
    # In a cloud deployment, replace with the internal hostname of your
    # API service (e.g. the Render internal URL).
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward cookies so the httpOnly refresh token cookie travels through
        proxy_pass_header Set-Cookie;
    }

    # Static assets (JS/CSS bundles) — cache aggressively since Vite
    # content-hashes all asset filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — any path that doesn't match a real file gets index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
