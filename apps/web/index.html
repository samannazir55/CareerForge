<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06060c" />
    <meta name="description" content="Corvyx — AI-powered career platform. Build your resume, ace interviews, find jobs, and grow your career." />
    <meta property="og:title" content="Corvyx" />
    <meta property="og:description" content="AI-powered career platform. Resume builder, interview prep, job tracker and career coach in one place." />
    <meta property="og:image" content="https://corvyx.app/og-image.png" />
    <meta property="og:url" content="https://corvyx.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Corvyx" />
    <meta name="twitter:description" content="AI-powered career platform. Resume builder, interview prep, job tracker and career coach in one place." />
    <meta name="twitter:image" content="https://corvyx.app/og-image.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Structured data for search engines and AI crawlers/answer engines
         (Google, Perplexity, ChatGPT Search, etc.) — describes what Corvyx
         is and its real, current pricing tiers. Deliberately no
         aggregateRating/review block: schema.org rating markup is supposed
         to reflect genuine collected reviews, and Google's structured-data
         guidelines treat fabricated or placeholder ratings as spam that can
         get a site's rich-result eligibility revoked. Add that block later,
         wired to real review data, once there is any. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Corvyx",
      "url": "https://corvyx.app",
      "sameAs": [
        "https://www.facebook.com/profile.php?id=61591952677816",
        "https://www.instagram.com/corvyx.app/",
        "https://x.com/corvyx_ai"
      ],
      "logo": "https://corvyx.app/og-image.png",
      "description": "Corvyx is an AI-powered career platform. It combines an AI resume builder, ATS resume checker, job description matching, interview preparation, a job application tracker, and AI career coaching in one place.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": [
        { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "USD" },
        { "@type": "Offer", "name": "Professional", "price": "9", "priceCurrency": "USD", "billingIncrement": "month" },
        { "@type": "Offer", "name": "Premium", "price": "19", "priceCurrency": "USD", "billingIncrement": "month" }
      ],
      "featureList": [
        "AI Resume Builder",
        "ATS Resume Checker",
        "Job Description Matching",
        "Resume Tailoring",
        "AI Cover Letter Generator",
        "Interview Preparation",
        "Job Application Tracker",
        "Job Search",
        "Public Career Portfolio",
        "PDF and DOCX Export",
        "Template Marketplace"
      ]
    }
    </script>
    <!-- Google Search's favicon crawler has inconsistent support for
         SVG-only favicons and generally prefers PNG/ICO — the SVG is kept
         first for browsers/tabs (crisp at any size), with PNG fallbacks
         at Google's recommended square, multiple-of-48px sizes so the
         icon actually shows up next to corvyx.app in search results. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <title>Corvyx</title>
    <!-- External script avoids CSP 'script-src self' violations from inline scripts -->
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
