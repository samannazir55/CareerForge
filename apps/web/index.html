<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Corvyx — AI-powered career platform. Build your resume, ace interviews, find jobs, and grow your career." />
    <meta property="og:title" content="Corvyx" />
    <meta property="og:description" content="AI-powered career platform. Resume builder, interview prep, job tracker and career coach in one place." />
    <meta property="og:image" content="https://corvyx.app/og-image.png" />
    <meta property="og:url" content="https://corvyx.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <!-- Google Search's favicon crawler has inconsistent support for
         SVG-only favicons and generally prefers PNG/ICO — the SVG is kept
         first for browsers/tabs (crisp at any size), with PNG fallbacks
         at Google's recommended square, multiple-of-48px sizes so the
         icon actually shows up next to corvyx.app in search results. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <title>Corvyx</title>
    <!-- External script avoids CSP 'script-src self' violations from inline scripts -->
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
