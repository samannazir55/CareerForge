# ============================================================
# Corvyx — Render Deployment Configuration
# ============================================================

services:
  - type: web
    name: careerforge
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: samannazir55@email.com
      - key: PORT
        value: 8000
      # Read at build time by Vite (see apps/web/src/lib/analytics.ts) and
      # forwarded into the Docker build via the ARG declared in Dockerfile.
      - key: VITE_GA_MEASUREMENT_ID
        value: G-DFR41DEJLT
      - key: DATABASE_URL
        fromDatabase:
          name: careerforge-db
          property: connectionString
      # AI Keys — set these in Render dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: careerforge-db
    databaseName: careerforge
    plan: free
    user: cf_user