# ============================================================
# CareerForge — Render Deployment Configuration
# ============================================================

services:
  - type: web
    name: careerforge
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /docs
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: samannazir55@email.com
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: careerforge-db
          property: connectionString
      # AI Keys — set these in Render dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: careerforge-db
    databaseName: careerforge
    plan: free
    user: cf_user
